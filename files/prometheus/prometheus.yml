global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "cisco-router-snmp"
    metrics_path: /snmp
    params:
      auth: [cisco_v3]
      module: [if_mib]
    static_configs:
      - targets:
          - 172.16.2.1
        labels:
          device: cisco-router
          role: home-router
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: snmp-exporter:9116
