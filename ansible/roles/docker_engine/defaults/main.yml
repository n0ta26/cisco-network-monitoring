---
docker_engine_cli_path: /usr/bin/docker

docker_engine_apt_prerequisites:
  - ca-certificates
  - curl
  - gnupg

docker_engine_apt_keyring_path: /etc/apt/keyrings/docker.asc
docker_engine_apt_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armhf
docker_engine_apt_arch: "{{ docker_engine_apt_arch_map.get(ansible_architecture) }}"

docker_engine_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
