---
- name: Deploy SNMP monitoring stack
  hosts: monitoring_servers
  become: true

  collections:
    - community.docker

  pre_tasks:
    - name: Validate supported operating system family
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: "This playbook currently supports Debian family hosts only."

  roles:
    - role: docker_engine
      tags:
        - docker
    - role: monitoring_stack
      tags:
        - monitoring
