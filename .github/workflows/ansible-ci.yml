name: Ansible CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  syntax-check:
    name: Ansible syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and lint tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core ansible-lint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Show Ansible version
        run: ansible --version

      - name: Run ansible-lint
        working-directory: ansible
        run: ansible-lint playbooks/deploy-monitoring.yml

      - name: Run syntax check
        working-directory: ansible
        run: ansible-playbook -i inventory.yml playbooks/deploy-monitoring.yml --syntax-check
