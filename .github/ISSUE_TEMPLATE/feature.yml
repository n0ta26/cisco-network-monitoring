name: Feature request
description: Propose a new feature or improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion.
        Explain the problem and proposed solution clearly so we can evaluate it quickly.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What problem are you facing?
      placeholder: Describe the pain point or use case.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
      placeholder: Describe your proposed feature.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or alternative approach you considered.
      placeholder: Optional
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: How should we judge this as complete?
      placeholder: |
        - [ ] Condition 1
        - [ ] Condition 2
