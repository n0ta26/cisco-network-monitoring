name: Bug report
description: Report an unexpected behavior or failure
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug.
        Please provide enough detail so we can reproduce and fix it quickly.
  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What happened?
      placeholder: Describe the actual behavior.
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: Describe the expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Please list exact steps.
      placeholder: |
        1. Run ...
        2. Edit ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, tool versions, and any relevant runtime details
      placeholder: e.g. macOS 14, ansible 2.17, nix 2.22
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste error logs or attach screenshots if available.
      render: shell
